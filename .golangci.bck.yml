run:
  timeout: 5m

linters:
  enable:
    # Security
    - gosec
    - bodyclose
    - noctx

    # Bugs & Reliability
    - govet
    - staticcheck
    - errcheck
    - errorlint
    - gocritic
    - ineffassign
    - unused
    - gosimple
    - nilerr
    - nilnesserr
    - nilnil
    - forcetypeassert
    - durationcheck
    - rowserrcheck
    - sqlclosecheck
    - contextcheck
    - containedctx
    - fatcontext
    - reassign
    - wastedassign
    - copyloopvar
    - recvcheck
    - spancheck

    # Code Quality
    - unconvert
    - unparam
    - nakedret
    # prealloc: disabled — most slices are populated from channels with unknown size
    - nestif
    - cyclop
    - gocognit
    - gocyclo
    - funlen
    - maintidx

    # Style & Consistency
    - gofmt
    - goimports
    - misspell
    - dupword
    - godot
    - revive
    - stylecheck
    - whitespace
    - predeclared
    - errname
    - ireturn
    - wrapcheck
    - goconst
    - perfsprint
    - usestdlibvars
    - asciicheck
    - bidichk
    - gocheckcompilerdirectives
    - goprintffuncname
    - musttag
    - tagalign
    - tagliatelle
    - intrange
    - exptostd

linters-settings:
  gosec:
    severity: high
    confidence: medium
    excludes:
      # G204: Subprocess with variable — all exec calls use validated inputs
      # (docker, pip, npm, strace). This is a CLI tool that orchestrates containers.
      - G204
      # G304: File inclusion via variable — CLI tool reads user-specified paths.
      - G304
      # G301: Directory permissions 0750 — 0755 is standard for temp dirs.
      - G301
      # G306: File permissions 0600 — 0644/0444 are appropriate for non-secret files.
      - G306
      # G115: Integer overflow int8→byte — eBPF struct conversions, no real overflow risk.
      - G115
      # G104: Errors unhandled — cleanup Close() calls where errors are not actionable.
      - G104

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - opinionated

  errcheck:
    check-type-assertions: true
    check-blank: true

  errorlint:
    errorf: true
    asserts: true
    comparison: true

  govet:
    enable-all: true

  cyclop:
    max-complexity: 15

  gocognit:
    min-complexity: 20

  gocyclo:
    min-complexity: 15

  funlen:
    lines: 80
    statements: 50
    ignore-comments: true

  nestif:
    min-complexity: 5

  nakedret:
    max-func-lines: 10

  misspell:
    locale: US

  revive:
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  tagliatelle:
    case:
      rules:
        json: snake

  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - errors.Join(
      - .Wrap(
      - .Wrapf(
      - .WithMessage(
      - .WithMessagef(
      - .WithStack(

  maintidx:
    under: 20

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files are more relaxed
    - path: _test\.go
      linters:
        - funlen
        - gocritic
        - gocognit
        - cyclop
        - wrapcheck
        - errcheck
    # Build-tag stub files
    - path: probe_stub\.go
      linters:
        - errcheck
        - unused
    - path: probe_other\.go
      linters:
        - ireturn
        - revive
