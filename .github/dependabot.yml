version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Docker (Dockerfile.sandbox) is intentionally excluded.
  # The Python base image version must stay in sync with
  # SandboxPythonVersion in internal/sandbox/sandbox.go.
  # Automated bumps break this coupling.
