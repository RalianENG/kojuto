version: "2"
linters:
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - dupword
    - durationcheck
    - errname
    - errorlint
    - exptostd
    - fatcontext
    - forcetypeassert
    - funlen
    - gocheckcompilerdirectives
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - intrange
    - ireturn
    - maintidx
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - perfsprint
    - predeclared
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    # tagliatelle disabled: npm's devDependencies uses camelCase by spec
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    - wrapcheck
  settings:
    cyclop:
      max-complexity: 20
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - os.RemoveAll
        - (io.Closer).Close
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    funlen:
      lines: 100
      statements: 60
      ignore-comments: true
    gocognit:
      min-complexity: 30
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
    gocyclo:
      min-complexity: 20
    gosec:
      excludes:
        - G204
        - G304
        - G301
        - G306
        - G115
        - G104
      severity: high
      confidence: medium
    govet:
      enable-all: true
      disable:
        - fieldalignment
    maintidx:
      under: 20
    misspell:
      locale: US
    nakedret:
      max-func-lines: 10
    nestif:
      min-complexity: 8
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
    tagliatelle:
      case:
        rules:
          json: snake
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - cyclop
          - errcheck
          - funlen
          - gocognit
          - gocritic
          - wrapcheck
        path: _test\.go
      - linters:
          - errcheck
          - unused
        path: probe_stub\.go
      - linters:
          - ireturn
          - revive
        path: probe_other\.go
      - linters:
          - errcheck
        path: sandbox\.go
        text: "cmd.Run|rand.Read"
      - linters:
          - wrapcheck
        path: root\.go
      - linters:
          - staticcheck
        text: "SA6000|SA4000|QF1002"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
